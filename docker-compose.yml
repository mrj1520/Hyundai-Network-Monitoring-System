version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1520Hasan@
      POSTGRES_DB: netpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:1520Hasan%40@db:5432/netpulse
      APP_NAME: "Hyundai Network Monitoring"
      APP_ENV: "production"
      JWT_SECRET: "supersecretenterprisejwtkeyfornetpulsenocmonitoring"
    volumes:
      - ./backend/reports_export:/app/reports_export

volumes:
  postgres_data:
